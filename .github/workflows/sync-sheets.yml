name: Sync from Google Sheets
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Sync from Google Sheets
      env:
        SHEET_ID: '1bsri9oEnubWAkZ5cXtrweNRjPncWXt4jXFQ5HSUSDCY'
        API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
      run: |
        # Create sync script
        cat > sync.js << 'EOF'
        const https = require('https');
        const fs = require('fs');
        
        const SHEET_ID = process.env.SHEET_ID;
        const API_KEY = process.env.API_KEY;
        
        function makeRequest(url) {
          return new Promise((resolve, reject) => {
            https.get(url, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  resolve(JSON.parse(data));
                } catch (e) {
                  reject(e);
                }
              });
            }).on('error', reject);
          });
        }
        
        async function syncFromSheets() {
          try {
            console.log('📊 Fetching from Google Sheets...');
            
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/TRIP_DATA_FOR_SHEETS!A1:J100?key=${API_KEY}`;
            const data = await makeRequest(url);
            
            if (!data.values || data.values.length < 2) {
              throw new Error('No data found in sheet');
            }
            
            const [headers, ...rows] = data.values;
            console.log(`📋 Found ${rows.length} events`);
            
            // Group events by segment
            const segments = {};
            const eventLinks = [];
            
            rows.forEach((row, index) => {
              const [title, details, date, time, location, status, type, links, host, segment] = row;
              if (!title) return;
              
              // Collect event links for header
              if (type === 'Event' && links) {
                eventLinks.push({
                  title,
                  location,
                  links,
                  date
                });
              }
              
              // Group by segment
              const segmentName = segment || 'Other';
              if (!segments[segmentName]) {
                segments[segmentName] = [];
              }
              
              const badges = [];
              if (time) badges.push(`<span class="badge time-badge">🕐 ${time}</span>`);
              if (date) badges.push(`<span class="badge date-badge">${date}</span>`);
              
              let statusClass = '';
              if (status === 'Action Needed') {
                badges.push(`<span class="badge action-badge">⚠️ ${status}</span>`);
                statusClass = ' action-needed';
              } else if (status === 'Waitlisted') {
                badges.push(`<span class="badge waitlist-badge">${status}</span>`);
                statusClass = ' waitlisted';
              } else if (status) {
                badges.push(`<span class="badge status-badge">${status}</span>`);
              }
              
              if (type) badges.push(`<span class="badge ${type.toLowerCase()}-badge">${type}</span>`);
              if (location) badges.push(`<span class="badge location-badge">${location}</span>`);
              
              const eventLinksHtml = links ? 
                links.split(',').map(link => 
                  `<a href="${link.trim()}" target="_blank" class="event-link">🔗 Link</a>`
                ).join('') : '';
              
              const hostInfo = host ? `<div class="host-info">🏠 <strong>Host:</strong> ${host}</div>` : '';
              const icon = getIcon(type);
              
              const eventHtml = `
                <div class="event-item${statusClass}" onclick="toggleTransport(${segments[segmentName].length})">
                  <div class="event-icon">${icon}</div>
                  <div class="event-content">
                    <div class="event-title">${title}</div>
                    <div class="event-details">${details || ''}</div>
                    <div class="event-badges">${badges.join('')}</div>
                    ${hostInfo}
                    ${eventLinksHtml}
                    <button class="expand-toggle" onclick="event.stopPropagation(); toggleTransport(${segments[segmentName].length})">
                      🚗 Show transport details
                    </button>
                    <div class="transport-info" id="transport-${segments[segmentName].length}">
                      <div><strong>Location:</strong> ${location || 'TBD'}</div>
                      <div><strong>Transport:</strong> Details to be added</div>
                      ${host ? `<div><strong>Host:</strong> ${host}</div>` : ''}
                    </div>
                  </div>
                </div>
              `;
              
              segments[segmentName].push(eventHtml);
            });
            
            // Generate dynamic event links
            const dynamicEventLinks = eventLinks.slice(0, 4).map(event => {
              const firstLink = event.links.split(',')[0];
              const icon = event.title.includes('Picnic') ? '📅' : 
                          event.title.includes('Improv') ? '🎪' : 
                          event.title.includes('Birthday') || event.title.includes('BDAY') ? '🥂' : 
                          event.title.includes('Memorial') ? '🧺' : '🎭';
              
              // Clean up location - extract key location info
              let cleanLocation = event.location;
              if (cleanLocation.includes('Main Parade - Presidio Park')) {
                cleanLocation = 'Presidio Park';
              } else if (cleanLocation.includes('Fort Mason')) {
                cleanLocation = 'Fort Mason, SF';
              } else if (cleanLocation.includes('NYC Upper West Side')) {
                cleanLocation = 'Upper West Side, NYC';
              } else if (cleanLocation.includes('149 Idelwood Drive')) {
                cleanLocation = 'Stamford';
              } else {
                // Generic cleanup - take first part before comma
                cleanLocation = cleanLocation.split(',')[0].trim();
              }
              
              const shortTitle = event.title.replace('Aussie American in the Bay - ', '')
                                          .replace('Trell Cousins Early BDAY drinks Upper West Side', 'Trell Cousins Birthday')
                                          .replace('Memorial Day Gathering', 'Memorial Day Gathering');
              
              return `<a href="${firstLink.trim()}" target="_blank">${icon} ${shortTitle} - ${cleanLocation} (${event.date})</a>   <br>`;
            }).join('         \\n            ');
            
            // Generate segmented sections - FORCE CHRONOLOGICAL ORDER BY TRIP TIMELINE
            const timelineOrder = ['Sydney - Depart', 'San Francisco - Part 1', 'Chicago', 'East Coast - NY/CT/DC', 'San Francisco - Part 2', 'Sydney - Return'];
            const segmentEmojis = {
              'Sydney - Depart': '✈️ Sydney - Departure',
              'San Francisco - Part 1': '🌉 San Francisco - Part 1',
              'Chicago': '🏙️ Chicago', 
              'East Coast - NY/CT/DC': '🗽 East Coast (NY/CT/DC)',
              'San Francisco - Part 2': '🌉 San Francisco - Part 2',
              'Sydney - Return': '🏠 Sydney - Return'
            };
            
            let sectionsHtml = '';
            let globalEventCounter = 0;
            
            // Process segments in forced chronological order
            timelineOrder.forEach(segmentKey => {
              // Check all possible variations of segment names
              const possibleKeys = [segmentKey];
              if (segmentKey === 'San Francisco') possibleKeys.push('SF');
              if (segmentKey === 'East Coast - NY/CT/DC') possibleKeys.push('East Coast');
              
              for (const key of possibleKeys) {
                if (segments[key] && segments[key].length > 0) {
                  const segmentTitle = segmentEmojis[key] || `📍 ${key}`;
                  const segmentEvents = segments[key].map(eventHtml => {
                    // Update event counter in the HTML
                    return eventHtml.replace(/toggleTransport\(\d+\)/g, () => {
                      return `toggleTransport(${globalEventCounter++})`;
                    }).replace(/transport-\d+/g, () => {
                      return `transport-${globalEventCounter - 1}`;
                    });
                  }).join('');
                  
                  sectionsHtml += `
                    <div class="trip-section">
                      <div class="section-header">
                        <span>${segmentTitle}</span>
                        <span>${segments[key].length} items</span>
                      </div>
                      <div class="section-content">
                        ${segmentEvents}
                      </div>
                    </div>
                  `;
                  break; // Only process the first matching key
                }
              }
            });
            
            // Read template
            const template = fs.readFileSync('index.html', 'utf8');
            
            // Replace dynamic event links
            const eventLinksStart = template.indexOf('<h3>🎭 Direct Event Links:</h3>');
            const eventLinksEnd = template.indexOf('</div>', eventLinksStart);
            
            let updatedTemplate = template;
            if (eventLinksStart !== -1 && eventLinksEnd !== -1) {
              const newEventLinksSection = `<h3>🎭 Direct Event Links:</h3>
            ${dynamicEventLinks}`;
              updatedTemplate = template.substring(0, eventLinksStart) + 
                               newEventLinksSection + 
                               template.substring(eventLinksEnd);
            }
            
            // Replace trip content
            const startMarker = '<div id="tripContent">';
            const endMarker = '</div>\n            \n            <div class="progress-container"';
            
            const start = updatedTemplate.indexOf(startMarker);
            const end = updatedTemplate.indexOf(endMarker);
            
            if (start === -1 || end === -1) {
              throw new Error('Could not find tripContent markers in template');
            }
            
            const newHtml = updatedTemplate.substring(0, start + startMarker.length) + 
                            '\n' + sectionsHtml + '\n            ' + 
                            updatedTemplate.substring(end);
            
            // Update sync time
            const syncTime = new Date().toLocaleString();
            const finalHtml = newHtml.replace(
              /Last sync: [^<]*/,
              `Last sync: ${syncTime}`
            );
            
            fs.writeFileSync('index.html', finalHtml);
            
            console.log('✅ Successfully updated index.html');
            console.log(`🕒 Last sync: ${syncTime}`);
            console.log(`📊 Processed ${rows.length} events across ${Object.keys(segments).length} segments`);
            console.log(`🔗 Generated ${eventLinks.length} dynamic event links`);
            
          } catch (error) {
            console.error('❌ Sync failed:', error.message);
            process.exit(1);
          }
        }
        
        function getIcon(type) {
          const icons = {
            'Flight': '✈️',
            'Event': '🎭',
            'Work': '💼',
            'Accommodation': '🏠',
            'Family': '👨‍👩‍👧‍👦',
            'Social': '🤝',
            'Travel': '🗺️',
            'Tourism': '🗽',
            'Transport': '🚗',
            'Home': '🏠'
          };
          return icons[type] || '📅';
        }
        
        syncFromSheets();
        EOF
        
        # Run the sync
        node sync.js
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Auto-Sync Bot"
        git add index.html
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Auto-sync from Google Sheets $(date)"
          git push
          echo "✅ Changes pushed to GitHub"
        fi